<div class="max-w-[90rem] mx-auto px-4 py-8 space-y-6">
  <div>
    <h1 class="text-2xl font-display text-black">Administração</h1>
    <p class="mt-1 text-aluminium font-arial">Configurações e gerenciamento do sistema</p>
  </div>

  <div class="card">
    <div class="card-body flex flex-col items-center gap-4 py-16 text-center">
      <lucide-icon name="wrench" [size]="48" class="text-aluminium opacity-50"></lucide-icon>
      <div>
        <h2 class="text-lg font-display text-black">Em desenvolvimento</h2>
        <p class="mt-1 text-aluminium text-sm">Esta área estará disponível em breve.</p>
      </div>
      <a routerLink="/relatorio" class="btn btn-ghost border border-border mt-2">Voltar ao relatório</a>
    </div>
  </div>
</div>
