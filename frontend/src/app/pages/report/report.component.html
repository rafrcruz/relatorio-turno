<div class="max-w-[90rem] mx-auto px-2 sm:px-4 lg:px-6 py-4 3xl:max-w-none 3xl:px-12">
  <div class="3xl:flex 3xl:gap-8 3xl:items-start">

    <!-- Painel esquerdo: contexto + composer + indicadores (sidebar em 3xl) -->
    <div class="space-y-4 3xl:w-[440px] 3xl:flex-shrink-0 3xl:sticky 3xl:top-20 3xl:max-h-[calc(100vh-5.5rem)] 3xl:overflow-y-auto 3xl:pb-4">
      <div *ngIf="context$ | async as ctx">
        <h1 class="text-2xl font-display text-black">Relatório de Turno</h1>
        <p class="mt-1 text-aluminium font-arial">
          {{ ctx.area }} — {{ ctx.date | date:'dd/MM/yyyy' }} — Turno {{ ctx.shift }}
        </p>
      </div>

      <section id="composer">
        <app-post-composer></app-post-composer>
      </section>

      <app-area-indicators id="area-indicators"></app-area-indicators>

      <div *ngIf="otherContext" class="p-3 bg-warm/20 border border-warm rounded-xl text-sm">
        Post pertencente a outro contexto.
        <button (click)="changeContext()" class="text-hydro-blue underline ml-1">Ajustar contexto</button>
      </div>
    </div>

    <!-- Painel direito: listas de posts -->
    <div class="space-y-4 mt-4 3xl:mt-0 3xl:flex-1 3xl:min-w-0">
      <app-post-list
        id="urgencies"
        type="URGENCY"
        title="Urgências"
        [highlightId]="highlightType === 'URGENCY' ? highlightId : undefined"
      ></app-post-list>

      <app-post-list
        id="pendencies"
        type="PENDENCY"
        title="Pendências"
        [highlightId]="highlightType === 'PENDENCY' ? highlightId : undefined"
      ></app-post-list>

      <app-post-list
        id="notes"
        type="ANNOTATION"
        title="Anotações"
        [highlightId]="highlightType === 'ANNOTATION' ? highlightId : undefined"
      ></app-post-list>
    </div>

  </div>
</div>
