<div class="report-page">

  <!-- Context banner -->
  <div *ngIf="context$ | async as ctx" class="report-context">
    <h1 class="report-title">Relatorio de Turno</h1>
    <p class="report-subtitle">
      {{ ctx.area }} - {{ ctx.date | date:'dd/MM/yyyy' }} - Turno {{ ctx.shift }}
    </p>
  </div>

  <!-- Tabs: Passagem / Indicadores -->
  <div role="tablist" aria-label="Visoes do relatorio" class="report-tabs">
    <button
      type="button"
      role="tab"
      [attr.aria-selected]="activeTab === 'passagem'"
      (click)="setTab('passagem')"
      class="report-tab"
      [ngClass]="activeTab === 'passagem' ? 'report-tab-active' : 'report-tab-idle'"
    >
      Passagem
    </button>
    <button
      type="button"
      role="tab"
      [attr.aria-selected]="activeTab === 'indicadores'"
      (click)="setTab('indicadores')"
      class="report-tab"
      [ngClass]="activeTab === 'indicadores' ? 'report-tab-active' : 'report-tab-idle'"
    >
      Indicadores
    </button>
  </div>

  <!-- ===== Passagem tab ===== -->
  <ng-container *ngIf="activeTab === 'passagem'">
    <div class="report-main-flow">
      <section id="composer">
        <app-post-composer></app-post-composer>
      </section>

      <app-area-indicators id="area-indicators" (openAll)="openIndicators()"></app-area-indicators>

      <div *ngIf="otherContext" class="p-3 bg-warm/20 border border-warm/50 rounded-xl text-sm font-arial">
        Post pertencente a outro contexto.
        <button (click)="changeContext()" class="text-hydro-blue underline ml-1">Ajustar contexto</button>
      </div>
    </div>

    <div class="report-lists">
      <app-post-list
        id="urgencies"
        type="URGENCY"
        title="Urgencias"
        [highlightId]="highlightType === 'URGENCY' ? highlightId : undefined"
      ></app-post-list>

      <app-post-list
        id="pendencies"
        type="PENDENCY"
        title="Pendencias"
        [highlightId]="highlightType === 'PENDENCY' ? highlightId : undefined"
      ></app-post-list>

      <app-post-list
        id="notes"
        type="ANNOTATION"
        title="Anotacoes"
        [highlightId]="highlightType === 'ANNOTATION' ? highlightId : undefined"
      ></app-post-list>
    </div>
  </ng-container>

  <!-- ===== Indicadores tab ===== -->
  <ng-container *ngIf="activeTab === 'indicadores'">
    <app-indicators-view></app-indicators-view>
  </ng-container>

</div>
