<section class="card mt-4">
  <div class="card-body space-y-3">
    <h2 class="text-lg font-display">{{ title }} <span class="text-sm font-arial text-mid-gray font-normal">({{ count }})</span></h2>

    <div *ngIf="loading" class="space-y-3">
      <div class="skeleton h-24 w-full rounded-xl"></div>
      <div class="skeleton h-24 w-full rounded-xl"></div>
      <div class="skeleton h-20 w-full rounded-xl"></div>
    </div>

    <div *ngIf="error && !loading" class="empty-state">
      <lucide-icon name="circle-x" [size]="36" class="text-bauxite opacity-70"></lucide-icon>
      <p class="text-sm font-medium">Erro ao carregar.</p>
      <button (click)="retry()" class="btn btn-secondary mt-1">Tentar novamente</button>
    </div>

    <div *ngIf="!loading && !error && posts.length === 0" class="empty-state">
      <lucide-icon name="inbox" [size]="40" class="opacity-40"></lucide-icon>
      <p class="text-sm font-medium">Sem {{ title.toLowerCase() }} para este turno.</p>
    </div>

    <article
      *ngFor="let post of posts; trackBy: trackById"
      [attr.id]="'post-' + post.id"
      class="border border-border rounded-xl shadow-sm overflow-hidden border-l-4"
      [ngClass]="[cardBorderClass(), post.id === highlightId ? 'bg-warm/30' : 'bg-white']"
    >
      <div class="p-3 space-y-2">
        <div class="flex justify-between items-center gap-2">
          <span class="badge" [ngClass]="badgeClass()">{{ typeLabel() }}</span>
          <span class="text-xs text-mid-gray">{{ post.author.name }} — {{ post.createdAt | date:'dd/MM/yyyy HH:mm' }}</span>
        </div>
        <div
          class="prose prose-sm max-w-none"
          [innerHTML]="post.content"
          (click)="onContentClick($event)"
          (keydown.enter)="onContentClick($event)"
        ></div>
        <div *ngIf="post.attachments.length" class="flex flex-col gap-1">
          <ng-container *ngFor="let att of post.attachments">
            <button
              *ngIf="att.mimeType.startsWith('image/')"
              type="button"
              class="p-0 bg-transparent border-0 inline-block text-left"
              [attr.aria-label]="sanitizeAlt(att.filename)"
              (click)="openImage(att.url, sanitizeAlt(att.filename))"
            >
              <img
                [src]="att.url"
                [alt]="sanitizeAlt(att.filename)"
                class="max-w-full max-h-64 object-contain border border-border rounded cursor-pointer"
              />
            </button>
            <a
              *ngIf="att.mimeType === 'application/pdf'"
              [href]="att.url"
              target="_blank"
              class="flex items-center gap-1 text-hydro-blue text-sm hover:underline"
            >
              <lucide-icon name="link" [size]="14"></lucide-icon> {{ att.filename }}
            </a>
          </ng-container>
        </div>
        <div class="flex flex-wrap items-center gap-1 pt-1 border-t border-border">
          <button class="btn-ghost" (click)="thread.toggleComposer()">Responder</button>
          <button class="btn-ghost" (click)="copyLink(post)">Copiar link</button>
          <span class="text-xs text-mid-gray ml-1">{{ post._count.replies }} respostas · {{ post.updatedAt | date:'dd/MM HH:mm' }}</span>
          <button class="btn-danger ml-auto" (click)="deletePost(post)">Excluir</button>
        </div>
      </div>
      <app-reply-thread #thread [post]="post"></app-reply-thread>
    </article>

    <div *ngIf="!loading && posts.length < count" class="text-center pt-1">
      <button (click)="loadMore()" class="btn btn-ghost border border-border">Carregar mais</button>
    </div>
  </div>
</section>

<button
  *ngIf="modalImageUrl"
  type="button"
  class="fixed inset-0 bg-black/75 flex items-center justify-center z-50"
  (click)="closeImage()"
  (keydown)="onModalKeydown($event)"
>
  <img
    [src]="modalImageUrl"
    [alt]="modalAlt"
    class="max-w-[90vw] max-h-[90vh] object-contain rounded-lg shadow-2xl"
    (click)="$event.stopPropagation()"
    (keydown.enter)="$event.stopPropagation()"
  />
</button>
