<div
  class="card p-4 space-y-3"
  (drop)="onDrop($event)"
  (dragover)="$event.preventDefault()"
>
  <div
    role="radiogroup"
    aria-label="Tipo de publicação"
    class="flex border border-border rounded-lg overflow-hidden divide-x divide-border text-sm shadow-sm"
  >
    <label
      class="px-3 py-1.5 cursor-pointer flex-1 text-center transition-colors duration-200 focus-within:ring-2 focus-within:ring-hydro-light-blue"
      [ngClass]="type === 'ANNOTATION'
        ? 'bg-hydro-blue text-white hover:bg-hydro-dark-blue'
        : 'hover:bg-surface-alt'"
    >
      <input
        class="sr-only"
        type="radio"
        name="type"
        [(ngModel)]="type"
        value="ANNOTATION"
        (ngModelChange)="saveDraft()"
      />
      Anotação
    </label>
    <label
      class="px-3 py-1.5 cursor-pointer flex-1 text-center transition-colors duration-200 focus-within:ring-2 focus-within:ring-hydro-light-blue"
      [ngClass]="type === 'URGENCY'
        ? 'bg-bauxite text-white hover:opacity-90'
        : 'hover:bg-surface-alt'"
    >
      <input
        class="sr-only"
        type="radio"
        name="type"
        [(ngModel)]="type"
        value="URGENCY"
        (ngModelChange)="saveDraft()"
      />
      Urgência
    </label>
    <label
      class="px-3 py-1.5 cursor-pointer flex-1 text-center transition-colors duration-200 focus-within:ring-2 focus-within:ring-hydro-light-blue"
      [ngClass]="type === 'PENDENCY'
        ? 'bg-warm text-black hover:opacity-90'
        : 'hover:bg-surface-alt'"
    >
      <input
        class="sr-only"
        type="radio"
        name="type"
        [(ngModel)]="type"
        value="PENDENCY"
        (ngModelChange)="saveDraft()"
      />
      Pendência
    </label>
  </div>

  <div class="w-full border border-border rounded-lg shadow-sm" (paste)="onPaste($event)">
    <quill-editor
      #editor
      [(ngModel)]="content"
      [modules]="modules"
      format="html"
      (ngModelChange)="saveDraft()"
      placeholder="Escreva uma atualização do turno… Ex.: status de produção, ocorrências, apontamentos"
      class="min-h-[100px] w-full"
    ></quill-editor>
  </div>

  <div *ngIf="attachments.length" class="space-y-1.5">
    <div *ngFor="let att of attachments" class="flex items-center gap-2 p-1.5 rounded-lg border border-border bg-surface-alt">
      <img *ngIf="att.url" [src]="att.url" alt="Pré-visualização" class="w-12 h-12 object-cover rounded" />
      <lucide-icon *ngIf="!att.url" name="link" [size]="16" class="text-mid-gray flex-shrink-0"></lucide-icon>
      <span class="text-sm text-aluminium truncate flex-1">{{ att.file.name }} <span class="text-mid-gray">({{ att.file.size / 1024 | number:'1.0-0' }} KB)</span></span>
      <button type="button" (click)="removeAttachment(att)" class="btn-danger text-xs px-1.5 py-0.5">Remover</button>
    </div>
  </div>

  <div class="flex items-center gap-2">
    <label class="btn-ghost cursor-pointer">
      <input type="file" multiple class="hidden" (change)="onFileInput($event)" />
      Anexar arquivos
    </label>
    <button
      type="button"
      (click)="publish()"
      [disabled]="sending"
      class="btn btn-primary disabled:opacity-50 ml-auto"
    >
      {{ sending ? 'Publicando…' : 'Publicar' }}
    </button>
  </div>
</div>
