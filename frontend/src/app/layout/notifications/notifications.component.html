<div class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
  <div
    *ngFor="let m of messages"
    [@slideNotif]
    class="pointer-events-auto flex items-center gap-2 px-4 py-2.5 rounded-lg shadow-lg text-white text-sm min-w-[220px] max-w-sm"
    [ngClass]="{
      'bg-green': m.type === 'success',
      'bg-bauxite': m.type === 'error',
      'bg-hydro-blue': m.type === 'info'
    }"
  >
    <lucide-icon [name]="iconName(m.type)" [size]="16" class="flex-shrink-0"></lucide-icon>
    <span class="flex-1">{{ m.message }}</span>
    <button
      type="button"
      class="flex-shrink-0 opacity-70 hover:opacity-100 transition-opacity ml-1"
      aria-label="Fechar notificação"
      (click)="remove(m)"
    >
      <lucide-icon name="circle-x" [size]="14"></lucide-icon>
    </button>
  </div>
</div>
