<header class="sticky top-0 z-10 bg-white shadow-header" role="banner">
  <div class="max-w-[90rem] mx-auto px-4 sm:px-6 lg:px-8 3xl:max-w-none 3xl:px-16 py-2.5 flex flex-wrap items-center gap-3">

    <!-- Logo -->
    <img
      src="assets/brand/hydro/logos/primary/hydro-logo-vertical-blue.png"
      alt="Hydro"
      class="h-14 w-auto hidden sm:block"
    />
    <img
      src="assets/brand/hydro/logos/secondary/hydro-logo-horizontal-blue.png"
      alt="Hydro"
      class="h-10 w-auto sm:hidden"
    />

    <!-- Divider -->
    <div class="hidden sm:block w-px h-8 bg-border mx-1"></div>

    <!-- Context controls -->
    <div class="flex flex-wrap items-center gap-2 ml-auto" *ngIf="context$ | async as ctx">

      <!-- Area selector -->
      <div class="relative" id="area-selector">
        <label for="area-select" class="sr-only">Área</label>
        <button
          type="button"
          id="area-select"
          (click)="toggleAreaDropdown()"
          class="min-w-[9rem] flex items-center justify-between gap-2 px-3 py-1.5 bg-white border border-border rounded-xl text-sm font-arial shadow-sm hover:border-hydro-light-blue hover:bg-surface-alt transition-all focus:outline-none focus:ring-2 focus:ring-hydro-light-blue/50"
        >
          <span class="truncate max-w-[10rem]">{{ ctx.area || 'Selecione a área' }}</span>
          <svg
            class="w-3.5 h-3.5 text-mid-gray flex-shrink-0 transition-transform duration-150"
            [ngClass]="{ 'rotate-180': areaDropdownOpen }"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2"
            stroke="currentColor"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="m6 9 6 6 6-6" />
          </svg>
        </button>
        <ul
          *ngIf="areaDropdownOpen"
          class="absolute left-0 mt-1.5 w-56 max-h-64 overflow-auto bg-white border border-border rounded-2xl shadow-dropdown z-20 py-1"
        >
          <li *ngFor="let area of areas">
            <button
              type="button"
              (click)="selectArea(area.name)"
              (keydown)="onAreaKeydown($event, area.name)"
              class="w-full text-left px-3 py-1.5 text-sm font-arial cursor-pointer transition-colors hover:bg-surface-hover"
              [ngClass]="ctx.area === area.name ? 'bg-hydro-blue/8 text-hydro-blue font-semibold' : 'text-[#1A1D21]'"
            >
              {{ area.name }}
            </button>
          </li>
        </ul>
      </div>

      <!-- Date -->
      <label for="date" class="sr-only">Data</label>
      <input
        id="date"
        type="date"
        class="px-3 py-1.5 bg-white border border-border rounded-xl text-sm font-arial shadow-sm hover:border-hydro-light-blue transition-all focus:outline-none focus:ring-2 focus:ring-hydro-light-blue/50"
        [ngModel]="ctx.date"
        (ngModelChange)="onDateChange($event)"
      />

      <!-- Shift selector -->
      <div
        role="radiogroup"
        aria-label="Turno"
        class="flex border border-border rounded-xl overflow-hidden divide-x divide-border text-sm shadow-sm bg-white"
      >
        <label
          class="px-3 py-1.5 cursor-pointer flex-1 text-center font-arial transition-colors duration-150 focus-within:ring-2 focus-within:ring-inset focus-within:ring-hydro-light-blue"
          [ngClass]="ctx.shift === 1 ? 'bg-hydro-blue text-white' : 'text-mid-gray hover:bg-surface-hover hover:text-[#1A1D21]'"
        >
          <input type="radio" name="shift" class="sr-only" [value]="1" [checked]="ctx.shift === 1" (change)="onShiftChange(1)" [disabled]="!ctx.date" />
          T1
        </label>
        <label
          class="px-3 py-1.5 cursor-pointer flex-1 text-center font-arial transition-colors duration-150 focus-within:ring-2 focus-within:ring-inset focus-within:ring-hydro-light-blue"
          [ngClass]="ctx.shift === 2 ? 'bg-hydro-blue text-white' : 'text-mid-gray hover:bg-surface-hover hover:text-[#1A1D21]'"
        >
          <input type="radio" name="shift" class="sr-only" [value]="2" [checked]="ctx.shift === 2" (change)="onShiftChange(2)" [disabled]="!ctx.date" />
          T2
        </label>
        <label
          class="px-3 py-1.5 cursor-pointer flex-1 text-center font-arial transition-colors duration-150 focus-within:ring-2 focus-within:ring-inset focus-within:ring-hydro-light-blue"
          [ngClass]="ctx.shift === 3 ? 'bg-hydro-blue text-white' : 'text-mid-gray hover:bg-surface-hover hover:text-[#1A1D21]'"
        >
          <input type="radio" name="shift" class="sr-only" [value]="3" [checked]="ctx.shift === 3" (change)="onShiftChange(3)" [disabled]="!ctx.date" />
          T3
        </label>
      </div>

      <!-- Export PDF -->
      <button
        type="button"
        (click)="exportPdf()"
        class="btn btn-primary py-1.5 px-3"
        title="Exportar PDF"
        aria-label="Exportar PDF"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m.75 12 3 3m0 0 3-3m-3 3v-6m-1.5-9H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
        </svg>
        <span class="hidden lg:inline text-xs">PDF</span>
        <span class="sr-only">Exportar PDF</span>
      </button>

      <!-- User avatar -->
      <div
        class="w-7 h-7 rounded-full bg-hydro-blue/10 border border-hydro-blue/20 flex items-center justify-center text-hydro-blue font-arial font-semibold text-xs"
        aria-label="Usuário"
      >
        U
      </div>
    </div>

  </div>
</header>
